name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
        default: ""

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm intent
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "Confirmation string must be 'deploy'. Got: ${{ github.event.inputs.confirm }}"
            exit 1
          fi

  deploy-prod:
    needs: guard
    runs-on: ubuntu-latest
    environment: production      # requires manual approval in GitHub → Settings → Environments
    steps:
      - name: Deploy to gatekeeper (production)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GATEKEEPER_HOST }}
          port: 44441
          username: ${{ secrets.GATEKEEPER_USER }}
          key: ${{ secrets.GATEKEEPER_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR=/opt/model-gateway

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_DIR"
            else
              git -C "$DEPLOY_DIR" pull --ff-only
            fi

            cd "$DEPLOY_DIR"

            [ -f /opt/model-gateway.env ] && cp /opt/model-gateway.env .env

            docker compose up --build -d

            # Smoke test via nginx (or direct if nginx not yet wired)
            sleep 8
            curl -fsS http://127.0.0.1:8503/health | grep '"status":"ok"'
            echo "Production deploy OK"
