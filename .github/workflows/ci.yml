name: CI + Staging Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy-staging:
    if: github.event_name == 'push'   # only deploy on merge, not on PRs
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to gatekeeper (staging)
        env:
          SSH_KEY: ${{ secrets.GATEKEEPER_SSH_KEY }}
          HOST: ${{ secrets.GATEKEEPER_HOST }}
          USER: ${{ secrets.GATEKEEPER_USER }}
        run: |
          # Write key to temp file with strict permissions
          KEY_FILE=$(mktemp)
          chmod 600 "$KEY_FILE"
          echo "$SSH_KEY" > "$KEY_FILE"

          ssh_cmd() {
            ssh -i "$KEY_FILE" \
              -p 44441 \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              "$USER@$HOST" "$@"
          }

          ssh_cmd bash -s << 'REMOTE'
          set -euo pipefail
          DEPLOY_DIR=/opt/model-gateway-staging

          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            git clone https://github.com/gperdrizet/model-gateway.git "$DEPLOY_DIR"
          else
            git -C "$DEPLOY_DIR" pull --ff-only
          fi

          cd "$DEPLOY_DIR"

          COMPOSE_PROJECT_NAME=staging docker compose \
            -f docker-compose.yml \
            -f docker-compose.staging.yml \
            up --build -d

          sleep 15
          curl -fsS http://127.0.0.1:8505/health | grep '"status":"ok"'
          echo "Staging deploy OK"
          REMOTE

          rm -f "$KEY_FILE"
